<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 240px; margin: 0; padding: 16px; color: #1a1a1a; }
    h1 { font-size: 16px; margin: 0 0 6px; background: linear-gradient(135deg,#fd297b,#ff5864); -webkit-background-clip: text; background-clip: text; color: transparent; }
    p { font-size: 12px; color: #666; margin: 4px 0; }
    .status { font-size: 12px; padding: 8px; background: #fff5f8; border-radius: 8px; margin: 8px 0; }
    .warn { color: #d6336c; }
    button { width: 100%; background: linear-gradient(135deg,#fd297b,#ff5864); color:#fff; border:none; border-radius: 8px; padding: 9px; font-weight: 600; font-size: 13px; cursor: pointer; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>✦ XavecAI</h1>
  <p>Abra o Tinder e clique no botão ✦ no canto inferior direito.</p>
  <div class="status" id="status">Carregando…</div>
  <button id="openOptions">Abrir opções</button>
  <script src="popup.js"></script>
</body>
</html>
